# ================================================================
# API Gateway — VivaEventos
# ================================================================

# ── ConfigMap ────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: viva-eventos
data:
  AUTH_SERVICE_URL: "http://auth-service:8081"
  EVENT_SERVICE_URL: "http://event-service:8082"
  ORDER_SERVICE_URL: "http://order-service:8083"
  PAYMENT_SERVICE_URL: "http://payment-service:8084"
  TICKET_SERVICE_URL: "http://ticket-service:8085"

---
# ── Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: viva-eventos
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z keycloak 8080; do sleep 5; done
              echo "✓ Keycloak listo."
      containers:
        - name: api-gateway
          image: danielgomezcano/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: microservices-config   # KEYCLOAK_ISSUER_URI
            - configMapRef:
                name: gateway-config         # URLs de los servicios
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 45
            periodSeconds: 30

---
# ── Service (NodePort 30090) ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: viva-eventos
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
  type: NodePort

---
# ── Ingress (opcional — si el clúster tiene Ingress Controller) ──
# Si usan minikube: minikube addons enable ingress
# Si usan kind: instalar nginx ingress controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: viva-eventos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: vivaeventos.local   # agregar a /etc/hosts: 127.0.0.1 vivaeventos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8090